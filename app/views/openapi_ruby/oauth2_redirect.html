<!doctype html>
<html lang="en-US">
<head>
    <title>Swagger UI: OAuth2 Redirect</title>
</head>
<body>
<script>
    'use strict';
    function run () {
        var oauth2 = window.opener.swaggerUIRedirectOauth2;
        var sentState = oauth2.state;
        var redirectUrl = oauth2.redirectUrl;
        var isValid, qp, arr;

        if (/code|token|error/.test(window.location.href)) {
            if (window.location.search) {
                qp = parseSearch(window.location.search);
            } else {
                qp = parseHash(window.location.hash);
            }

            isValid = qp.state === sentState;

            if ((
              oauth2.auth.schema.get("flow") === "accessCode"||
              oauth2.auth.schema.get("flow") === "authorizationCode"||
              oauth2.auth.schema.get("flow") === "authorization_code"
            ) && !oauth2.auth.code) {
                if (!isValid) {
                    oauth2.errCb({
                        authId: oauth2.auth.name,
                        source: "auth",
                        level: "warning",
                        message: "Authorization may be unsafe, passed state was changed in server. The passed state wasn't returned from auth server."
                    });
                }

                if (qp.code) {
                    delete qp.state;
                    oauth2.auth.code = qp.code;
                    oauth2.callback({auth: oauth2.auth, redirectUrl: redirectUrl});
                } else {
                    var oauthErrorMsg;
                    if (qp.error) {
                        oauthErrorMsg = "["+qp.error+"]: " + (qp.error_description ? qp.error_description + ". " : "no accessCode received from the server. ") + (qp.error_uri ? "More info: "+qp.error_uri : "");
                    }

                    oauth2.errCb({
                        authId: oauth2.auth.name,
                        source: "auth",
                        level: "error",
                        message: oauthErrorMsg || "[Authorization failed]: no accessCode received from the server."
                    });
                }
            } else {
                oauth2.callback({auth: oauth2.auth, token: qp, isValid: isValid, redirectUrl: redirectUrl});
            }
        }
        window.close();
    }

    function parseSearch(str) {
        return parseParams(str.substr(1));
    }

    function parseHash(str) {
        return parseParams(str.substr(1));
    }

    function parseParams(str) {
        return str.split("&").reduce(function (params, param) {
            var keyValue = param.split("=");
            params[keyValue[0]] = decodeURIComponent(keyValue[1]);
            return params;
        }, {});
    }

    window.addEventListener('DOMContentLoaded', function () {
        run();
    });
</script>
</body>
</html>
